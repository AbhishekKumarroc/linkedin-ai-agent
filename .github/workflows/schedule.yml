name: AI Automation Content Pipeline

on:
  schedule:
    # Runs at a random minute between 4:00 and 5:00 UTC (9:30 - 10:30 AM IST)
    # Using '30 4 * * *' to start exactly at 10:00 AM IST
    - cron: '30 4 * * *'
  workflow_dispatch: # Allows manual triggering whenever you want

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        # Added python-dotenv here to fix your ModuleNotFoundError
        run: |
          python -m pip install --upgrade pip
          pip install requests google-generativeai python-dotenv
        
      - name: Run AI Agent (Main)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
        run: python main.py
        
      - name: Commit and Push History
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add history.txt daily_log.txt
          git commit -m "Auto-update agent history and logs" || echo "No changes to commit"
          git push

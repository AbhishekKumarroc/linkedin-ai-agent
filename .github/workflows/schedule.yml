name: Daily AI LinkedIn Poster

on:
  schedule:
    # Runs at 4:30 AM UTC every day, which is exactly 10:00 AM IST (India Standard Time)
    - cron: '30 4 * * *'
  
  # This line allows you to trigger the script manually by clicking a button!
  workflow_dispatch: 

jobs:
  run-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write # This gives the bot permission to save history.txt back to your repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai requests feedparser beautifulsoup4 python-dotenv urllib3

      - name: Run AI Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
        run: python main.py

      - name: Save history.txt back to repository
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add history.txt
          # This command checks if history.txt changed. If yes, it saves it. If no, it does nothing.
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update posting history" && git push)

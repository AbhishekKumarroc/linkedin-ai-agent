name: AI Automation Content Pipeline

on:
  schedule:
    # 4:15 AM UTC is 9:45 AM IST (Within your 9:30-10:30 window)
    - cron: '15 4 * * *'
  workflow_dispatch: # Manual trigger button

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        # Added feedparser and python-dotenv to the list
        run: |
          python -m pip install --upgrade pip
          pip install requests google-generativeai python-dotenv feedparser
        
      - name: Run AI Agent (Main)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
        run: python main.py
        
      - name: Commit and Push History
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add history.txt daily_log.txt
          git commit -m "Auto-update agent history and logs" || echo "No changes to commit"
          git push
